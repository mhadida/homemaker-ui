<!doctype html>
<html>
<head><meta charset="utf-8"><title>walls-only debug</title>
<style>html,body{margin:0;height:100%;background:#222;color:#eee;font:12px monospace}</style>
</head>
<body>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({antialias: true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
const scene = new THREE.Scene();
scene.background = new THREE.Color('#222');
const cam = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 0.1, 200);
cam.position.set(15, 12, 15);
const ctrl = new OrbitControls(cam, renderer.domElement);
ctrl.target.set(0, 2, 0);

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const dl = new THREE.DirectionalLight(0xffffff, 1.2);
dl.position.set(10, 15, 8);
scene.add(dl);

const grid = new THREE.GridHelper(40, 40, 0x444444, 0x333333);
scene.add(grid);

const fetchUrl = new URLSearchParams(location.search).get('src') || '/api/debug-walls';
new GLTFLoader().load(fetchUrl, (gltf) => {
  // Force wireframe + flat-shaded so we see the actual triangle structure
  gltf.scene.traverse(o => {
    if (o.isMesh) {
      o.material = new THREE.MeshStandardMaterial({ color: 0xddd5cc, roughness: 0.85, flatShading: true, side: THREE.DoubleSide });
    }
  });
  scene.add(gltf.scene);

  // Also overlay wireframe so we can see edges
  gltf.scene.traverse(o => {
    if (o.isMesh) {
      const wire = new THREE.LineSegments(
        new THREE.WireframeGeometry(o.geometry),
        new THREE.LineBasicMaterial({ color: 0xff8800, transparent: true, opacity: 0.6 })
      );
      o.add(wire);
    }
  });
});

(function loop() { ctrl.update(); renderer.render(scene, cam); requestAnimationFrame(loop); })();
addEventListener('resize', () => { renderer.setSize(innerWidth, innerHeight); cam.aspect = innerWidth/innerHeight; cam.updateProjectionMatrix(); });
</script>
</body></html>
